name: Windows native sync

on:
  push:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "ai-config.sh"
      - "ai-config.ps1"
      - "scripts/**"
      - ".gitattributes"
      - ".github/workflows/windows-native.yml"
      - "tests/**"
  pull_request:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "ai-config.sh"
      - "ai-config.ps1"
      - "scripts/**"
      - ".gitattributes"
      - ".github/workflows/windows-native.yml"
      - "tests/**"
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            shell: powershell
            executable: powershell.exe
          - name: PowerShell 7
            shell: pwsh
            executable: pwsh.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        shell: ${{ matrix.shell }}
        run: python -m pip install pytest PyYAML

      - name: Run test suite
        shell: ${{ matrix.shell }}
        env:
          PWSH: ${{ matrix.executable }}
        run: >-
          python -m pytest
          tests/test_repository_invariants.py
          tests/test_windows_sync.py
