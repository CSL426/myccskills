name: Windows native sync

on:
  push:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "ai-config.sh"
      - "ai-config.ps1"
      - "ai_config/**"
      - "legacy/**"
      - ".gitattributes"
      - ".github/workflows/windows-native.yml"
      - "tests/**"
  pull_request:
    paths:
      - "CLAUDE.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "ai-config.sh"
      - "ai-config.ps1"
      - "ai_config/**"
      - "legacy/**"
      - ".gitattributes"
      - ".github/workflows/windows-native.yml"
      - "tests/**"
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        shell: pwsh
        run: python -m pip install pytest PyYAML

      - name: Run Python CLI contract
        shell: pwsh
        env:
          AI_CONFIG_IMPL: py
        run: >-
          python -m pytest
          tests/test_repository_invariants.py
          tests/test_windows_sync.py

  legacy-powershell:
    name: Legacy ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            shell: powershell
            executable: powershell.exe
          - name: PowerShell 7
            shell: pwsh
            executable: pwsh.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        shell: ${{ matrix.shell }}
        run: python -m pip install pytest PyYAML

      - name: Test root PowerShell wrapper
        shell: ${{ matrix.shell }}
        run: |
          $executable = (Get-Command '${{ matrix.executable }}').Source
          $script = Join-Path $env:GITHUB_WORKSPACE 'ai-config.ps1'
          $help = Start-Process -FilePath $executable -WorkingDirectory $env:RUNNER_TEMP -ArgumentList '-NoProfile', '-File', $script, 'help' -Wait -PassThru -NoNewWindow
          if ($help.ExitCode -ne 0) { throw "Wrapper help failed with exit code $($help.ExitCode)" }
          $unknown = Start-Process -FilePath $executable -WorkingDirectory $env:RUNNER_TEMP -ArgumentList '-NoProfile', '-File', $script, 'explode' -Wait -PassThru -NoNewWindow
          if ($unknown.ExitCode -ne 1) { throw "Wrapper returned unexpected exit code $($unknown.ExitCode)" }

      - name: Run test suite
        shell: ${{ matrix.shell }}
        env:
          AI_CONFIG_IMPL: ps1
          PWSH: ${{ matrix.executable }}
        run: >-
          python -m pytest
          tests/test_repository_invariants.py
          tests/test_windows_sync.py
